services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: weer
      POSTGRES_PASSWORD: weer
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U weer" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    image: weer
    container_name: weer
    ports:
      - "2080:2080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./packages/server/.env
    environment:
      - SEED_DB
      - START_MODE
      - DOCKER=true
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=weer
      - DB_PASSWORD=weer
      - DB_DATABASE=weer
      - REDIS=true
      - REDIS_URL=redis://redis:6379
    volumes:
      - app_logs:/app/packages/server/logs

  janitor:
    build: .
    image: weer
    entrypoint: [ "node", "dist/janitor.js" ]
    working_dir: /app/packages/server
    restart: on-failure
    profiles: [ "node" ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started
    env_file:
      - ./packages/server/.env
    environment:
      - DOCKER=true
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=weer
      - DB_PASSWORD=weer
      - DB_DATABASE=weer
      - REDIS=true
      - REDIS_URL=redis://redis:6379

volumes:
  postgres_data:
  app_logs:
